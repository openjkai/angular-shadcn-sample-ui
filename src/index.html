<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Portfolio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Developer portfolio built with Angular, Tailwind CSS, and shadcn-ng-style UI primitives."
    />
    <meta name="author" content="Portfolio" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <link rel="canonical" href="https://example.com/" />
    <!-- Replace https://example.com above and add og:image when you have a production URL + image. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Portfolio" />
    <meta
      property="og:description"
      content="Developer portfolio built with Angular, Tailwind CSS, and shadcn-ng-style UI primitives."
    />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Portfolio" />
    <meta
      name="twitter:description"
      content="Developer portfolio built with Angular, Tailwind CSS, and shadcn-ng-style UI primitives."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "Portfolio",
            "url": "https://example.com/",
            "description": "Developer portfolio built with Angular, Tailwind CSS, and shadcn-ng-style UI primitives."
          },
          {
            "@type": "Person",
            "name": "Your name",
            "url": "https://example.com/",
            "sameAs": ["https://github.com/", "https://www.linkedin.com/"]
          }
        ]
      }
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var k = 'angular-shadcn-sample-ui-theme';
        try {
          var t = localStorage.getItem(k);
          var dark =
            t === 'dark' ||
            (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
