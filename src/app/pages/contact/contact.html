<section class="page-section space-y-8">
  <div>
    <h1 class="text-foreground text-3xl font-bold tracking-tight sm:text-4xl">Contact</h1>
    <p class="text-muted-foreground mt-2 max-w-2xl text-base leading-relaxed sm:text-lg">
      Swap these placeholders for your real email and social profiles.
    </p>
  </div>

  <div ubCard class="max-w-xl">
    <div ubCardHeader>
      <h3 ubCardTitle class="text-xl">Get in touch</h3>
      <p ubCardDescription>
        Prefer email or a quick link to your profile—keep one primary call to action.
      </p>
    </div>
    <div ubCardContent class="flex flex-col gap-3 sm:flex-row sm:flex-wrap">
      <a href="mailto:hello@example.com" ubButton class="gap-2">
        <ng-icon name="lucide-mail" class="size-4" />
        hello&#64;example.com
      </a>
      <a
        href="https://github.com"
        target="_blank"
        rel="noopener noreferrer"
        ubButton
        variant="outline"
        class="gap-2"
      >
        <ng-icon name="lucide-github" class="size-4" />
        GitHub
      </a>
      <a
        href="https://www.linkedin.com"
        target="_blank"
        rel="noopener noreferrer"
        ubButton
        variant="outline"
        class="gap-2"
      >
        <ng-icon name="lucide-linkedin" class="size-4" />
        LinkedIn
      </a>
    </div>
  </div>
</section>
