<div class="bg-background text-foreground flex min-h-dvh flex-col">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header
    class="border-border bg-background/95 supports-[backdrop-filter]:bg-background/80 sticky top-0 z-50 w-full border-b backdrop-blur"
  >
    <!-- Top bar: brand + theme; nav is desktop-only here -->
    <div class="layout-container flex items-center gap-4 py-3 sm:py-4 lg:h-16 lg:py-0">
      <a
        routerLink="/"
        class="text-foreground focus-visible:ring-ring shrink-0 rounded-sm text-base font-semibold tracking-tight focus-visible:ring-2 focus-visible:outline-none"
      >
        Portfolio
      </a>

      <!-- Desktop: nav centered in remaining space -->
      <nav
        class="text-muted-foreground hidden flex-1 justify-center gap-1 md:flex"
        aria-label="Main"
      >
        <a
          routerLink="/"
          routerLinkActive="bg-accent text-accent-foreground"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:bg-accent/80 rounded-md px-3 py-2 text-sm font-medium transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Home
        </a>
        <a
          routerLink="/about"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 rounded-md px-3 py-2 text-sm font-medium transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          About
        </a>
        <a
          routerLink="/projects"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 rounded-md px-3 py-2 text-sm font-medium transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Projects
        </a>
        <a
          routerLink="/contact"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 rounded-md px-3 py-2 text-sm font-medium transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Contact
        </a>
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 rounded-md px-3 py-2 text-sm font-medium transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Dashboard
        </a>
        <a
          routerLink="/forms"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 rounded-md px-3 py-2 text-sm font-medium transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Forms
        </a>
      </nav>

      <div class="ml-auto flex shrink-0 items-center">
        <button
          type="button"
          ubButton
          variant="outline"
          size="icon"
          class="shrink-0"
          (click)="theme.toggle()"
          [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (theme.isDark()) {
            <ng-icon name="lucide-sun" class="size-4" />
          } @else {
            <ng-icon name="lucide-moon" class="size-4" />
          }
        </button>
      </div>
    </div>

    <!-- Mobile / small tablet: full-width nav strip with safe horizontal scroll -->
    <nav class="text-muted-foreground border-border border-t md:hidden" aria-label="Main">
      <div
        class="layout-container flex gap-1 overflow-x-auto overscroll-x-contain py-2 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
      >
        <a
          routerLink="/"
          routerLinkActive="bg-accent text-accent-foreground"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:bg-accent/80 shrink-0 rounded-md px-3 py-2 text-sm font-medium whitespace-nowrap transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Home
        </a>
        <a
          routerLink="/about"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 shrink-0 rounded-md px-3 py-2 text-sm font-medium whitespace-nowrap transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          About
        </a>
        <a
          routerLink="/projects"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 shrink-0 rounded-md px-3 py-2 text-sm font-medium whitespace-nowrap transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Projects
        </a>
        <a
          routerLink="/contact"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 shrink-0 rounded-md px-3 py-2 text-sm font-medium whitespace-nowrap transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Contact
        </a>
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 shrink-0 rounded-md px-3 py-2 text-sm font-medium whitespace-nowrap transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Dashboard
        </a>
        <a
          routerLink="/forms"
          routerLinkActive="bg-accent text-accent-foreground"
          class="hover:bg-accent/80 shrink-0 rounded-md px-3 py-2 text-sm font-medium whitespace-nowrap transition-colors focus-visible:ring-ring focus-visible:ring-2 focus-visible:outline-none"
        >
          Forms
        </a>
      </div>
    </nav>
  </header>

  <main id="main-content" tabindex="-1" class="flex w-full flex-1 flex-col outline-none">
    <div
      class="layout-container flex flex-1 flex-col py-8 sm:py-10 lg:min-h-[min(60vh,720px)] lg:py-12"
    >
      <router-outlet />
    </div>
  </main>

  <footer class="border-border mt-auto border-t">
    <div
      class="text-muted-foreground layout-container flex flex-col items-center justify-between gap-3 py-8 text-sm sm:flex-row sm:py-10"
    >
      <span class="text-center sm:text-left">Portfolio · Angular sample</span>
      <span class="text-center sm:text-right">Angular · Tailwind · shadcn-ng</span>
    </div>
  </footer>
</div>
